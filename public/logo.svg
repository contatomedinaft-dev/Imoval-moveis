  <!-- Text: IMOVAL -->
  <text x="70" y="55" fill="white" font-family="sans-serif" font-size="42" font-weight="300" letter-spacing="2">IMOVAL</text>
  
  <!-- Text: MÓVEIS PLANEJADOS -->
  <text x="72" y="75" fill="white" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="4">MÓVEIS PLANEJADOS</text>
</svg>
